<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .nav-right {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            position: relative;
            font-size: 18px;
            padding-bottom: 5px;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 2px;

            background: linear-gradient(90deg, #00e0ff, #7c3aed);

            transition: 0.35s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .logo img {
            width: 50px;
            height: 50px;
            border-radius: 50px;
            object-fit: contain;
        }

        .button-call-now {
            font-size: 18px;
            padding: 12px 22px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            position: relative;
            background: linear-gradient(120deg, #ffffff, #7c3aed, #00e0ff, #7c3aed);
            background-size: 300% 300%;
            color: #111;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: gradientMove 6s ease infinite;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.35);
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .button-call-now::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.7),
                    transparent);
            transform: skewX(-25deg);
            transition: 0.7s;

        }

        .button-call-now:hover::before {
            left: 140%;
        }

        .button-call-now:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow:
                0 15px 35px rgba(124, 58, 237, 0.6),
                0 0 20px rgba(0, 224, 255, 0.5);
            color: rgb(206, 244, 255);
        }
    </style>
</head>

<body>
   <nav class="navbar">
    <div class="logo">
        <img src="assets/AWD-logo-e1752390943985.png" alt="logo">
        BrandName
    </div>

    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <a href="tel:+91800839826">
            <button class="button-call-now">Call Now</button>
        </a>
    </div>
</nav>
</body>

</html>
