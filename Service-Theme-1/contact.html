<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Contact</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/contact.css">
     <link rel="stylesheet" href="./css/footer.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="cursor-glow"></div>

    <div class="contact-wrapper">

        <h1 class="contact-title">Let's Create Something Amazing</h1>

        <div class="contact-grid">

            <!-- FORM -->

            <div class="contact-card">

                <form id="contactForm">

                    <div class="form-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>

                    <div class="form-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <input type="tel" placeholder="Phone Number">
                    </div>

                    <div class="form-group">
                        <input type="text" placeholder="Subject">
                    </div>

                    <div class="form-group">
                        <textarea placeholder="Your Message"></textarea>
                    </div>

                    <button type="submit">Send Message</button>

                    <div class="success">✔ Message Sent Successfully</div>

                </form>

            </div>

            <!-- INFO CARDS -->

            <div class="info-cards">

                <div class="info-card">
                    <h3>Email</h3>
                    <p>info@aiwebdesignservices.com</p>
                </div>

                <div class="info-card">
                    <h3>Phone</h3>
                    <p>+91 86883 77761</p>
                </div>

                <div class="info-card">
                    <h3>Location</h3>
                    <p>Hyderabad, India</p>
                </div>

            </div>

        </div>

        <!-- MAP -->

        <div class="map">

            <iframe src="https://maps.google.com/maps?q=hyderabad&t=&z=13&ie=UTF8&iwloc=&output=embed">
            </iframe>

        </div>

    </div>
    <div id="footer"></div>

    
    <script>
        fetch("./footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
            fetch("./navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });

        /* CURSOR GLOW */

        const glow = document.querySelector(".cursor-glow")

        document.addEventListener("mousemove", e => {
            glow.style.left = e.clientX + "px"
            glow.style.top = e.clientY + "px"
        })

        /* SUCCESS MESSAGE */

        document.getElementById("contactForm")
            .addEventListener("submit", function (e) {

                e.preventDefault()

                document.querySelector(".success").style.display = "block"

                this.reset()

            })

    </script>
</body>

</html>
